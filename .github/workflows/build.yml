name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund
      - name: Typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck 2>&1 | tee typecheck.log
          code=${PIPESTATUS[0]}
          echo "TYPECHECK_EXIT_CODE=$code" >> "$GITHUB_ENV"
          exit "$code"
      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: ignore
      - name: Build
        run: npm run build
