name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Yarn
        run: npm install -g yarn@1.22.22
      - name: Install dependencies
        run: yarn install --ignore-engines --non-interactive --network-timeout 600000
      - name: Build
        run: yarn build
