name: Quality Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Environment doctor
        run: npm run doctor

      - name: Tests
        run: npm run test

      - name: TypeScript
        run: npm run typecheck

      - name: Lint errors only
        run: npx eslint . --ext .ts,.tsx --ignore-path .eslintignore --quiet --format unix

      - name: Production build
        run: npm run build

      - name: Verify build did not mutate source
        run: |
          if ! git diff --quiet; then
            echo "Build or preparation scripts changed repository files."
            git diff --stat
            git diff
            exit 1
          fi
