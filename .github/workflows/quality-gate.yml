name: Quality Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Verify targeted repairs are idempotent
        run: |
          node scripts/audit-fix-semantic-lint.cjs
          if ! git diff --quiet -- src; then
            echo "Targeted repair script still changes committed source files."
            git diff --stat
            git diff
            exit 1
          fi

      - name: Environment doctor
        run: npm run doctor

      - name: Tests
        run: npm run test

      - name: TypeScript
        run: npm run typecheck

      - name: Semantic lint
        run: |
          npx eslint . --ext .ts,.tsx --ignore-path .eslintignore --quiet \
            --rule 'prettier/prettier: off'

      - name: Production build
        run: npm run build

      - name: Persist build-generated source fixes
        if: github.event_name == 'pull_request'
        run: |
          if git diff --quiet -- src; then
            echo "No build-generated source fixes remain."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src
            git commit -m "persist invoice and dashboard runtime fixes"
            git push origin HEAD:${{ github.head_ref }}
          fi
