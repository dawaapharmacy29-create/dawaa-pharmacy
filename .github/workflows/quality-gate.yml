name: Quality Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Verify targeted repairs are idempotent
        run: |
          node scripts/audit-fix-semantic-lint.cjs
          if ! git diff --quiet -- src; then
            echo "Targeted repair script still changes committed source files."
            git diff --stat
            git diff
            exit 1
          fi

      - name: Environment doctor
        run: npm run doctor

      - name: Tests
        run: npm run test

      - name: TypeScript
        run: npm run typecheck

      - name: Semantic lint
        id: semantic_lint
        continue-on-error: true
        run: |
          npx eslint . --ext .ts,.tsx --ignore-path .eslintignore --quiet \
            --rule 'prettier/prettier: off' \
            --format json --output-file eslint-semantic-report.json

      - name: Upload semantic lint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semantic-lint-report
          path: eslint-semantic-report.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Enforce semantic lint
        if: steps.semantic_lint.outcome == 'failure'
        run: |
          node -e "const fs=require('fs'); const rows=JSON.parse(fs.readFileSync('eslint-semantic-report.json','utf8')); for (const row of rows) for (const m of row.messages) console.error(`${row.filePath}:${m.line}:${m.column} ${m.ruleId} ${m.message}`); process.exit(1)"

      - name: Production build
        run: npm run build

      - name: Verify commands did not mutate repository files
        run: |
          if ! git diff --quiet; then
            echo "Tests, typecheck, lint, or build changed repository files."
            git diff --stat
            git diff
            exit 1
          fi
