name: Quality Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Verify targeted repairs are idempotent
        run: |
          node scripts/audit-fix-semantic-lint.cjs
          if ! git diff --quiet -- src; then
            echo "Targeted repair script still changes committed source files."
            git diff --stat
            git diff
            exit 1
          fi

      - name: Environment doctor
        run: npm run doctor

      - name: Tests
        run: npm run test

      - name: TypeScript
        run: npm run typecheck

      - name: Semantic lint
        run: |
          npx eslint . --ext .ts,.tsx --ignore-path .eslintignore --quiet \
            --rule 'prettier/prettier: off'

      - name: Production build
        run: npm run build

      - name: Capture build mutations
        if: always()
        run: |
          git diff --stat > build-mutations-stat.txt || true
          git diff --name-only > build-mutations-files.txt || true
          git diff > build-mutations.patch || true

      - name: Upload build mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-mutations
          path: |
            build-mutations-stat.txt
            build-mutations-files.txt
            build-mutations.patch
          retention-days: 7

      - name: Verify build did not mutate source
        run: |
          if ! git diff --quiet; then
            echo "Build or preparation scripts changed repository files."
            cat build-mutations-stat.txt
            exit 1
          fi
