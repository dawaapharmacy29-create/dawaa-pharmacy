name: Full Audit Bootstrap

on:
  push:
    branches: [audit/full-app-audit-v2-20260719]

concurrency:
  group: full-audit-bootstrap
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: audit/full-app-audit-v2-20260719

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Apply semantic repairs
        run: node scripts/audit-fix-semantic-lint.cjs

      - name: Apply existing invoice and dashboard repairs once
        run: npm run prepare:invoice-import

      - name: Commit generated source fixes
        run: |
          if git diff --quiet -- src; then
            echo "All fixes are already present."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src
          git commit -m "apply full audit fixes on latest main"
          git push origin HEAD:audit/full-app-audit-v2-20260719
