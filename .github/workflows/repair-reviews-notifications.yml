name: Repair reviews and notifications

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/repair-reviews-notifications.yml'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Patch reviews and notifications safely
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          reviews_path = Path('src/pages/Reviews.tsx')
          reviews = reviews_path.read_text(encoding='utf-8')

          anchor = "function scoreOf(row: ConversationReviewHistoryRow) {"
          helper = r'''function normalizeReviewState(value: unknown): ConversationReviewState {
  const defaults = defaultReviewState();
  const source = value && typeof value === 'object' ? (value as Partial<ConversationReviewState>) : {};

  return REVIEW_CRITERIA.reduce((acc, criterion) => {
    const candidate = source[criterion.key];
    const validChoice = criterion.choices.some((choice) => choice.value === candidate?.choice)
      ? String(candidate?.choice)
      : defaults[criterion.key].choice;

    acc[criterion.key] = {
      applies: typeof candidate?.applies === 'boolean' ? candidate.applies : defaults[criterion.key].applies,
      choice: validChoice,
      notes: typeof candidate?.notes === 'string' ? candidate.notes : '',
    };
    return acc;
  }, {} as ConversationReviewState);
}

function normalizeSevereErrorsState(value: unknown): SevereErrorsState {
  const defaults = defaultSevereErrors();
  const source = value && typeof value === 'object' ? (value as Partial<SevereErrorsState>) : {};
  return (Object.keys(defaults) as SevereErrorKey[]).reduce((acc, key) => {
    acc[key] = typeof source[key] === 'boolean' ? Boolean(source[key]) : defaults[key];
    return acc;
  }, {} as SevereErrorsState);
}

function safeCriterionState(state: ConversationReviewState, key: ReviewCriterionKey) {
  return state[key] || defaultReviewState()[key];
}

'''
          if 'function normalizeReviewState(value: unknown)' not in reviews:
              if anchor not in reviews:
                  raise SystemExit('Reviews helper anchor not found')
              reviews = reviews.replace(anchor, helper + anchor, 1)

          reviews = reviews.replace(
              "const [reviewState, setReviewState] = useState<ConversationReviewState>(defaultReviewState());",
              "const [reviewState, setReviewState] = useState<ConversationReviewState>(() => normalizeReviewState(defaultReviewState()));",
              1,
          )
          reviews = reviews.replace(
              "const [severeErrors, setSevereErrors] = useState<SevereErrorsState>(defaultSevereErrors());",
              "const [severeErrors, setSevereErrors] = useState<SevereErrorsState>(() => normalizeSevereErrorsState(defaultSevereErrors()));",
              1,
          )

          old_eval = "return evaluateConversationReview(reviewState, severeErrors);"
          if old_eval in reviews:
              reviews = reviews.replace(
                  old_eval,
                  "return evaluateConversationReview(normalizeReviewState(reviewState), normalizeSevereErrorsState(severeErrors));",
                  1,
              )

          reviews = reviews.replace(
              "if (draft.reviewState) setReviewState(draft.reviewState);",
              "if (draft.reviewState) setReviewState(normalizeReviewState(draft.reviewState));",
              1,
          )
          reviews = reviews.replace(
              "if (draft.severeErrors) setSevereErrors(draft.severeErrors);",
              "if (draft.severeErrors) setSevereErrors(normalizeSevereErrorsState(draft.severeErrors));",
              1,
          )

          reviews = reviews.replace(
              "setReviewState((current) => ({ ...current, [key]: { ...current[key], applies } }));",
              "setReviewState((current) => ({ ...normalizeReviewState(current), [key]: { ...safeCriterionState(current, key), applies } }));",
              1,
          )
          reviews = reviews.replace(
              "setReviewState((current) => ({ ...current, [key]: { ...current[key], choice } }));",
              "setReviewState((current) => ({ ...normalizeReviewState(current), [key]: { ...safeCriterionState(current, key), choice } }));",
              1,
          )
          reviews = reviews.replace(
              "setReviewState((current) => ({ ...current, [key]: { ...current[key], notes } }));",
              "setReviewState((current) => ({ ...normalizeReviewState(current), [key]: { ...safeCriterionState(current, key), notes } }));",
              1,
          )
          reviews = reviews.replace(
              "setSevereErrors((current) => ({ ...current, [key]: active }));",
              "setSevereErrors((current) => ({ ...normalizeSevereErrorsState(current), [key]: active }));",
              1,
          )

          reviews = reviews.replace(
              "const selectedChoices = reviewState;",
              "const selectedChoices = normalizeReviewState(reviewState);",
              1,
          )

          reviews = reviews.replace(
              "const itemState = reviewState[criterion.key];",
              "const itemState = safeCriterionState(reviewState, criterion.key);",
          )

          reviews = reviews.replace(
              "...current.first_response_speed,",
              "...safeCriterionState(current, 'first_response_speed'),",
          )
          reviews = reviews.replace(
              ": current.first_response_speed,",
              ": safeCriterionState(current, 'first_response_speed'),",
          )
          reviews = reviews.replace(
              "...current.followup_after_wait,",
              "...safeCriterionState(current, 'followup_after_wait'),",
          )
          reviews = reviews.replace(
              ": { ...current.followup_after_wait, applies: false },",
              ": { ...safeCriterionState(current, 'followup_after_wait'), applies: false },",
          )

          # Repair any remaining direct criterion access used for .applies/.choice in the save payload.
          for key in [
              'greeting', 'doctor_name', 'customer_name', 'tone', 'understanding',
              'followup_after_wait', 'unavailable_items', 'closing_message', 'angry_customer',
              'order_delay_handling', 'customer_request_registration'
          ]:
              reviews = reviews.replace(f"selectedChoices.{key}.applies", f"safeCriterionState(selectedChoices, '{key}').applies")
              reviews = reviews.replace(f"selectedChoices.{key}.choice", f"safeCriterionState(selectedChoices, '{key}').choice")

          reviews_path.write_text(reviews, encoding='utf-8')

          notif_path = Path('src/hooks/useNotifications.ts')
          notif = notif_path.read_text(encoding='utf-8')

          fetch_anchor = "async function fetchTable(table: NotificationTable) {"
          notif_helper = r'''async function updateNotificationReadState(
  table: NotificationTable,
  ids: string[]
) {
  if (!ids.length || !isSupabaseConfigured) return true;
  const readAt = new Date().toISOString();
  const payloads: Array<Record<string, unknown>> = [
    { read: true, is_read: true, status: 'read', read_at: readAt },
    { is_read: true, read_at: readAt },
    { read: true },
    { status: 'read' },
  ];

  for (const payload of payloads) {
    try {
      const query = supabase.from(table).update(payload);
      const { error } = ids.length === 1 ? await query.eq('id', ids[0]) : await query.in('id', ids);
      if (!error) return true;
    } catch {
      // Try the next schema-compatible payload.
    }
  }
  return false;
}

'''
          if 'async function updateNotificationReadState(' not in notif:
              if fetch_anchor not in notif:
                  raise SystemExit('Notifications helper anchor not found')
              notif = notif.replace(fetch_anchor, notif_helper + fetch_anchor, 1)

          old_mark_one = """      const { error } = await supabase.from(tableRef.current).update({ read: true, is_read: true, status: 'read', read_at: new Date().toISOString() }).eq('id', id);\n      if (error) throw error;"""
          new_mark_one = """      const updated = await updateNotificationReadState(tableRef.current, [id]);\n      if (!updated) throw new Error('No compatible notification read column was available');"""
          if old_mark_one in notif:
              notif = notif.replace(old_mark_one, new_mark_one, 1)

          old_mark_all = """      const { error } = await supabase.from(tableRef.current).update({ read: true, is_read: true, status: 'read', read_at: new Date().toISOString() }).in('id', ids);\n      if (error) throw error;"""
          new_mark_all = """      const updated = await updateNotificationReadState(tableRef.current, ids);\n      if (!updated) throw new Error('No compatible notification read column was available');"""
          if old_mark_all in notif:
              notif = notif.replace(old_mark_all, new_mark_all, 1)

          # Invalid or missing timestamps must not silently hide otherwise valid notifications.
          old_filter = "new Date(item.created_at).getTime() >= retentionStart"
          new_filter = "(() => { const time = new Date(item.created_at).getTime(); return !Number.isFinite(time) || time >= retentionStart; })()"
          notif = notif.replace(old_filter, new_filter, 1)

          notif_path.write_text(notif, encoding='utf-8')

          workflow = Path('.github/workflows/repair-reviews-notifications.yml')
          if workflow.exists():
              workflow.unlink()
          PY

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Build
        run: npm run build

      - name: Commit repair
        shell: bash
        run: |
          git config user.name "Dawaa Repair Bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/pages/Reviews.tsx src/hooks/useNotifications.ts .github/workflows/repair-reviews-notifications.yml
          git commit -m "fix reviews state and notification compatibility"
          git push origin main
