name: Apply invoice verification pagination fix

on:
  push:
    branches: [main]
    paths: [.github/workflows/apply-invoice-verification-pagination-fix.yml]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Patch invoice verification query
        shell: python
        run: |
          from pathlib import Path
          path = Path('src/lib/invoiceImporter.ts')
          text = path.read_text(encoding='utf-8')
          old = """  const { data, error } = await supabase
    .from('sales_invoices')
    .select(selectColumns)
    .gte('invoice_date', startDate)
    .lt('invoice_date', queryEndExclusive)
    .limit(100000);

  if (error)
    return {
      ...empty,
      databaseComparisonQuery: {
        table: 'sales_invoices',
        dateColumn: 'invoice_date',
        gte: queryStart,
        lt: queryEndExclusive,
        fileMinDate: queryStart,
        fileMaxDate: queryEnd,
        select: selectColumns,
        error: error.message || String(error),
        startDate: queryStart,
        endDate: queryEnd,
        endExclusive: queryEndExclusive,
      },
    };

  const databaseDays = new Map<string, { date: string; count: number; total: number }>();
"""
          new = """  const pageSize = 1000;
  const maxPages = 1000;
  const data: Array<Record<string, unknown>> = [];
  let page = 0;
  let verificationError: string | null = null;

  while (page < maxPages) {
    const from = page * pageSize;
    const to = from + pageSize - 1;
    const response = await supabase
      .from('sales_invoices')
      .select(selectColumns)
      .gte('invoice_date', startDate)
      .lt('invoice_date', queryEndExclusive)
      .order('invoice_date', { ascending: true })
      .order('id', { ascending: true })
      .range(from, to);

    if (response.error) {
      verificationError = response.error.message || String(response.error);
      break;
    }

    const pageRows = (response.data || []) as Array<Record<string, unknown>>;
    data.push(...pageRows);
    page += 1;
    if (pageRows.length < pageSize) break;
  }

  if (!verificationError && page >= maxPages) {
    verificationError = `تجاوز التحقق الحد الآمن لعدد الصفحات (${maxPages.toLocaleString('en-US')}).`;
  }

  if (verificationError)
    return {
      ...empty,
      databaseComparisonQuery: {
        table: 'sales_invoices',
        dateColumn: 'invoice_date',
        gte: queryStart,
        lt: queryEndExclusive,
        fileMinDate: queryStart,
        fileMaxDate: queryEnd,
        select: selectColumns,
        error: verificationError,
        startDate: queryStart,
        endDate: queryEnd,
        endExclusive: queryEndExclusive,
      },
    };

  const databaseDays = new Map<string, { date: string; count: number; total: number }>();
"""
          if old not in text:
            raise SystemExit('Target block not found; refusing unsafe patch')
          text = text.replace(old, new, 1)
          text = text.replace(
            "for (const row of (data || []) as Array<Record<string, unknown>>) {",
            "for (const row of data) {",
            1,
          )
          path.write_text(text, encoding='utf-8')

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      - name: Invoice importer tests
        run: pnpm test -- --run src/lib/__tests__/invoiceImporter.test.ts
      - name: Build
        run: pnpm build
      - name: Commit source fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/invoiceImporter.ts
          git commit -m "fix: paginate invoice post-import verification"
          git push origin HEAD:main
