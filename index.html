<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1B2B4B" />
    <meta name="description" content="Dawaa Pharmacy 2027 - نظام تشغيل الصيدلية الذكي" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dawaa 2027" />
    <title>Dawaa Pharmacy 2027 — نظام تشغيل الصيدلية الذكي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self' https: wss: https://*.supabase.co wss://*.supabase.co https://fonts.googleapis.com https://fonts.gstatic.com; img-src 'self' data: https: blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; frame-ancestors 'none';"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta
      http-equiv="Permissions-Policy"
      content="geolocation=(), camera=(), microphone=(), payment=(), interest-cohort=()"
    />
  </head>
  <body>
    <script>
      try {
        var pal = localStorage.getItem('dawaa_palette');
        if (pal === 'royal' || pal === 'forest' || pal === 'ocean')
          document.documentElement.dataset.palette = pal;
        else document.documentElement.dataset.palette = 'ocean';
        if (localStorage.getItem('dawaa_theme') === 'light')
          document.documentElement.classList.add('light-mode');
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script>
      // Emergency recovery when a stale service worker/cache or startup JS error leaves a blank screen.
      (function () {
        function goLogin() {
          window.location.href = '/login?_recovery=' + Date.now();
        }
        function cleanBestEffort() {
          try {
            sessionStorage.clear();
          } catch (e) {}
          try {
            var remove = [];
            for (var i = 0; i < localStorage.length; i++) {
              var k = localStorage.key(i);
              if (k && (k.indexOf('dawaa_') === 0 || k.indexOf('sb-') === 0 || k.indexOf('supabase') !== -1)) remove.push(k);
            }
            remove.forEach(function (k) { localStorage.removeItem(k); });
          } catch (e) {}
          try {
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function (regs) {
                regs.forEach(function (reg) { try { reg.unregister(); } catch (e) {} });
              }).catch(function () {});
            }
          } catch (e) {}
          try {
            if ('caches' in window) {
              caches.keys().then(function (keys) {
                keys.forEach(function (key) { try { caches.delete(key); } catch (e) {} });
              }).catch(function () {});
            }
          } catch (e) {}
        }
        function showRecovery(force) {
          if (document.getElementById('dawaa-emergency-recovery')) return;
          var root = document.getElementById('root');
          var text = root ? root.textContent || '' : '';
          var isBlank = !root || text.trim().length === 0;
          var isStillLoading = text.indexOf('جاري التحميل') !== -1 || text.indexOf('جارى التحميل') !== -1;
          if (!force && !isBlank && !isStillLoading) return;
          var box = document.createElement('div');
          box.id = 'dawaa-emergency-recovery';
          box.dir = 'rtl';
          box.style.cssText = 'position:fixed;left:24px;bottom:24px;z-index:999999;max-width:390px;background:#0f1b2d;color:#e5f7ff;border:1px solid rgba(45,212,191,.45);border-radius:18px;padding:16px;box-shadow:0 18px 50px rgba(0,0,0,.45);font-family:Cairo,Tahoma,sans-serif;line-height:1.8';
          box.innerHTML = '<b style="display:block;margin-bottom:6px;color:#2dd4bf">إصلاح تحميل التطبيق</b><span style="font-size:13px;color:#b7c7d8">ظهر توقف أو شاشة سوداء. زر الإصلاح ينقلك فورًا لتسجيل الدخول ثم ينظف الكاش في الخلفية.</span><a id="dawaa-recover-btn" href="/login" style="display:block;margin-top:12px;width:100%;box-sizing:border-box;text-align:center;text-decoration:none;border:0;border-radius:12px;background:#2dd4bf;color:#06202a;font-weight:900;padding:10px;cursor:pointer">إصلاح التحميل وفتح الدخول</a><a id="dawaa-login-btn" href="/login" style="display:block;margin-top:8px;width:100%;box-sizing:border-box;text-align:center;text-decoration:none;border:1px solid rgba(45,212,191,.35);border-radius:12px;background:transparent;color:#dff;font-weight:900;padding:9px;cursor:pointer">فتح تسجيل الدخول فقط</a>';
          document.body.appendChild(box);
          document.getElementById('dawaa-login-btn').onclick = function (event) {
            event.preventDefault();
            goLogin();
          };
          document.getElementById('dawaa-recover-btn').onclick = function (event) {
            event.preventDefault();
            cleanBestEffort();
            window.setTimeout(goLogin, 50);
          };
        }
        window.addEventListener('error', function () { setTimeout(function () { showRecovery(true); }, 0); });
        window.addEventListener('unhandledrejection', function () { setTimeout(function () { showRecovery(true); }, 0); });
        setTimeout(function () { showRecovery(false); }, 7000);
        setTimeout(function () { showRecovery(false); }, 14000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
