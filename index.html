<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1B2B4B" />
    <meta name="description" content="Dawaa Pharmacy 2027 - نظام تشغيل الصيدلية الذكي" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dawaa 2027" />
    <title>Dawaa Pharmacy 2027 — نظام تشغيل الصيدلية الذكي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Security: conservative Content Security Policy and other headers -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self' https: wss: https://*.supabase.co wss://*.supabase.co https://fonts.googleapis.com https://fonts.gstatic.com; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; frame-ancestors 'none';"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta
      http-equiv="Permissions-Policy"
      content="geolocation=(), camera=(), microphone=(), payment=(), interest-cohort=()"
    />
  </head>
  <body>
    <script>
      try {
        var pal = localStorage.getItem('dawaa_palette');
        if (pal === 'royal' || pal === 'forest' || pal === 'ocean')
          document.documentElement.dataset.palette = pal;
        else document.documentElement.dataset.palette = 'ocean';
        if (localStorage.getItem('dawaa_theme') === 'light')
          document.documentElement.classList.add('light-mode');
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script>
      // Emergency recovery when a stale service worker/cache keeps the app on "جاري التحميل".
      (function () {
        function showRecovery() {
          if (document.getElementById('dawaa-emergency-recovery')) return;
          var root = document.getElementById('root');
          var text = root ? root.textContent || '' : '';
          if (text.indexOf('جاري التحميل') === -1 && text.indexOf('جارى التحميل') === -1) return;
          var box = document.createElement('div');
          box.id = 'dawaa-emergency-recovery';
          box.dir = 'rtl';
          box.style.cssText = 'position:fixed;left:24px;bottom:24px;z-index:999999;max-width:360px;background:#0f1b2d;color:#e5f7ff;border:1px solid rgba(45,212,191,.45);border-radius:18px;padding:16px;box-shadow:0 18px 50px rgba(0,0,0,.45);font-family:Cairo,Tahoma,sans-serif;line-height:1.8';
          box.innerHTML = '<b style="display:block;margin-bottom:6px;color:#2dd4bf">التطبيق متوقف على التحميل</b><span style="font-size:13px;color:#b7c7d8">اضغط إصلاح التحميل لمسح كاش التطبيق القديم وإعادة فتح صفحة الدخول.</span><button id="dawaa-recover-btn" style="margin-top:12px;width:100%;border:0;border-radius:12px;background:#2dd4bf;color:#06202a;font-weight:900;padding:10px;cursor:pointer">إصلاح التحميل الآن</button>';
          document.body.appendChild(box);
          document.getElementById('dawaa-recover-btn').onclick = async function () {
            try {
              if ('caches' in window) {
                var keys = await caches.keys();
                await Promise.all(keys.map(function (key) { return caches.delete(key); }));
              }
              if ('serviceWorker' in navigator) {
                var regs = await navigator.serviceWorker.getRegistrations();
                await Promise.all(regs.map(function (reg) { return reg.unregister(); }));
              }
              try {
                var keep = [];
                for (var i = 0; i < localStorage.length; i++) {
                  var k = localStorage.key(i);
                  if (k && k.indexOf('sb-') !== 0) keep.push(k);
                }
                keep.forEach(function (k) { localStorage.removeItem(k); });
                sessionStorage.clear();
              } catch (e) {}
            } finally {
              location.replace('/login?_recovery=' + Date.now());
            }
          };
        }
        setTimeout(showRecovery, 9000);
        setTimeout(showRecovery, 18000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <!-- SW SKIP_WAITING handler -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.addEventListener('message', function (e) {
          if (e.data && e.data.type === 'SKIP_WAITING') {
            navigator.serviceWorker.getRegistration().then(function (reg) {
              if (reg && reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            });
          }
        });
      }
    </script>
  </body>
</html>
