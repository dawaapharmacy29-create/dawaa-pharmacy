<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1B2B4B" />
    <meta name="description" content="Dawaa Pharmacy 2027 - نظام تشغيل الصيدلية الذكي" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dawaa 2027" />
    <title>Dawaa Pharmacy 2027 — نظام تشغيل الصيدلية الذكي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Security: conservative Content Security Policy and other headers -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self' https: wss: https://*.supabase.co wss://*.supabase.co https://fonts.googleapis.com https://fonts.gstatic.com; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; frame-ancestors 'none';"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta
      http-equiv="Permissions-Policy"
      content="geolocation=(), camera=(), microphone=(), payment=(), interest-cohort=()"
    />
  </head>
  <body>
    <script>
      try {
        var pal = localStorage.getItem('dawaa_palette');
        if (pal === 'royal' || pal === 'forest' || pal === 'ocean')
          document.documentElement.dataset.palette = pal;
        else document.documentElement.dataset.palette = 'ocean';
        if (localStorage.getItem('dawaa_theme') === 'light')
          document.documentElement.classList.add('light-mode');
      } catch (e) {}
    </script>
    <script>
      (function () {
        try {
          var reviewDraftKey = 'dawaa_conversation_review_draft_v3';
          var rawDraft = localStorage.getItem(reviewDraftKey);
          if (rawDraft) {
            var draft = JSON.parse(rawDraft);
            var state = draft && draft.reviewState && typeof draft.reviewState === 'object'
              ? draft.reviewState
              : {};
            var defaults = {
              first_response_speed: { applies: true, choice: 'within_5', notes: '' },
              greeting: { applies: true, choice: 'official_full', notes: '' },
              doctor_name: { applies: true, choice: 'start', notes: '' },
              customer_name: { applies: false, choice: 'used', notes: '' },
              tone: { applies: true, choice: 'professional', notes: '' },
              understanding: { applies: true, choice: 'strong', notes: '' },
              followup_after_wait: { applies: false, choice: 'within_5', notes: '' },
              consultation_quality: { applies: false, choice: 'excellent', notes: '' },
              dosage_explanation: { applies: false, choice: 'clear', notes: '' },
              unavailable_items: { applies: false, choice: 'good_alternative', notes: '' },
              sales_closing: { applies: true, choice: 'closed', notes: '' },
              cross_sell_upsell: { applies: false, choice: 'successful', notes: '' },
              angry_customer: { applies: false, choice: 'excellent', notes: '' },
              order_confirmation: { applies: false, choice: 'complete', notes: '' },
              order_delay_handling: { applies: false, choice: 'no_delay', notes: '' },
              customer_request_registration: { applies: false, choice: 'registered', notes: '' },
              closing_message: { applies: true, choice: 'official', notes: '' }
            };
            Object.keys(defaults).forEach(function (key) {
              var current = state[key];
              if (!current || typeof current !== 'object') {
                state[key] = defaults[key];
                return;
              }
              if (typeof current.applies !== 'boolean') current.applies = defaults[key].applies;
              if (typeof current.choice !== 'string' || !current.choice) current.choice = defaults[key].choice;
              if (typeof current.notes !== 'string') current.notes = '';
            });
            draft.reviewState = state;
            localStorage.setItem(reviewDraftKey, JSON.stringify(draft));
          }
        } catch (error) {
          try { localStorage.removeItem('dawaa_conversation_review_draft_v3'); } catch (ignore) {}
        }

        try {
          var settingsKey = 'dawaa_notification_settings_v1';
          var savedSettings = JSON.parse(localStorage.getItem(settingsKey) || '{}');
          var notificationDefaults = {
            customerService: true,
            delivery: true,
            inventory: true,
            reviews: true,
            attendance: true,
            targets: true,
            highPriorityOnly: false,
            sound: 'soft',
            retentionDays: 30
          };
          var normalizedSettings = Object.assign({}, notificationDefaults, savedSettings || {});
          if (['off', 'soft', 'distinct'].indexOf(normalizedSettings.sound) === -1) normalizedSettings.sound = 'soft';
          var retention = Number(normalizedSettings.retentionDays);
          normalizedSettings.retentionDays = Number.isFinite(retention) && retention > 0 ? Math.min(Math.round(retention), 365) : 30;
          ['customerService', 'delivery', 'inventory', 'reviews', 'attendance', 'targets', 'highPriorityOnly'].forEach(function (key) {
            normalizedSettings[key] = typeof normalizedSettings[key] === 'boolean' ? normalizedSettings[key] : notificationDefaults[key];
          });
          localStorage.setItem(settingsKey, JSON.stringify(normalizedSettings));
        } catch (error) {
          try { localStorage.removeItem('dawaa_notification_settings_v1'); } catch (ignore) {}
        }
      })();
    </script>
    <div id="root"></div>
    <script>
      (function () {
        var RECOVERY_DELAY_MS = 8000;
        var shown = false;

        function recoveryUrl(path, reason) {
          var url = new URL(path, window.location.origin);
          url.searchParams.set('_recovery', reason + '_' + Date.now());
          return url.toString();
        }

        function cleanupInBackground(clearStorage) {
          try {
            if (window.caches) {
              window.caches.keys().then(function (keys) {
                console.info('[Dawaa sw] cache names found', keys);
                return Promise.all(keys.map(function (key) { return window.caches.delete(key); }));
              }).catch(function (error) { console.warn('[Dawaa recovery] cache cleanup failed', error); });
            }
          } catch (error) {
            console.warn('[Dawaa recovery] cache cleanup failed', error);
          }

          try {
            if (navigator.serviceWorker) {
              navigator.serviceWorker.getRegistrations().then(function (registrations) {
                console.info('[Dawaa sw] registrations found/removed', registrations.length);
                return Promise.all(registrations.map(function (registration) { return registration.unregister(); }));
              }).catch(function (error) { console.warn('[Dawaa recovery] sw cleanup failed', error); });
            }
          } catch (error) {
            console.warn('[Dawaa recovery] sw cleanup failed', error);
          }

          if (!clearStorage) return;
          try {
            ['localStorage', 'sessionStorage'].forEach(function (storageName) {
              var storage = window[storageName];
              var keys = [];
              for (var index = 0; index < storage.length; index += 1) {
                var key = storage.key(index);
                if (/^(dawA|dawaA|dawaa|supabase|sb-)/.test(key || '')) keys.push(key);
              }
              keys.forEach(function (key) { storage.removeItem(key); });
            });
          } catch (error) {
            console.warn('[Dawaa recovery] storage cleanup failed', error);
          }
        }

        function showRecovery(reason, detail) {
          if (shown || window.__DAWAA_REACT_BOOTSTRAPPED) return;
          shown = true;
          try {
            sessionStorage.setItem('dawA_last_runtime_error', JSON.stringify({
              source: 'index recovery',
              message: detail || reason,
              at: new Date().toISOString()
            }));
          } catch (error) {}

          var loginUrl = recoveryUrl('/login', reason);
          var cleanLoginUrl = recoveryUrl('/login', reason + '_clean');
          var diagnosticsUrl = recoveryUrl('/diagnostics', reason);
          var root = document.getElementById('root');
          if (!root) return;
          root.innerHTML =
            '<main dir="rtl" style="min-height:100vh;background:#020617;color:#f8fafc;display:flex;align-items:center;justify-content:center;padding:20px;font-family:Cairo,Tajawal,system-ui,sans-serif">' +
              '<section style="width:100%;max-width:520px;background:#0f172a;border:1px solid rgba(45,212,191,.35);border-radius:18px;padding:24px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.35)">' +
                '<div style="margin:0 auto 14px;width:54px;height:54px;border-radius:16px;background:rgba(20,184,166,.14);display:grid;place-items:center;font-size:28px">!</div>' +
                '<h1 style="margin:0;font-size:24px;font-weight:900">إصلاح تحميل التطبيق</h1>' +
                '<p style="margin:12px 0 0;color:#cbd5e1;line-height:1.8;font-size:14px">لم يكتمل تحميل التطبيق. استخدم تسجيل الدخول أو التشخيص مباشرة، وسيتم تنظيف ملفات التشغيل القديمة في الخلفية عند اختيار الإصلاح.</p>' +
                '<div style="display:grid;gap:10px;margin-top:22px">' +
                  '<a href="' + loginUrl + '" style="background:#0d9488;color:white;text-decoration:none;border-radius:12px;padding:13px 16px;font-weight:900">فتح تسجيل الدخول فقط</a>' +
                  '<a id="dawaa-index-repair" href="' + cleanLoginUrl + '" style="background:rgba(20,184,166,.12);border:1px solid rgba(45,212,191,.45);color:#ccfbf1;text-decoration:none;border-radius:12px;padding:13px 16px;font-weight:900">إصلاح التحميل</a>' +
                  '<a id="dawaa-index-clean" href="' + cleanLoginUrl + '" style="background:rgba(245,158,11,.12);border:1px solid rgba(251,191,36,.45);color:#fef3c7;text-decoration:none;border-radius:12px;padding:13px 16px;font-weight:900">تنظيف كامل والدخول من جديد</a>' +
                  '<a href="' + diagnosticsUrl + '" style="border:1px solid #334155;color:#e2e8f0;text-decoration:none;border-radius:12px;padding:13px 16px;font-weight:900">فتح التشخيص</a>' +
                '</div>' +
              '</section>' +
            '</main>';

          var repair = document.getElementById('dawaa-index-repair');
          var clean = document.getElementById('dawaa-index-clean');
          if (repair) {
            repair.addEventListener('click', function () {
              cleanupInBackground(true);
              console.info('[Dawaa recovery] redirecting to login', cleanLoginUrl);
              window.location.assign(cleanLoginUrl);
            });
          }
          if (clean) {
            clean.addEventListener('click', function () {
              cleanupInBackground(true);
              console.info('[Dawaa recovery] redirecting to login', cleanLoginUrl);
              window.location.assign(cleanLoginUrl);
            });
          }
        }

        window.addEventListener('error', function (event) {
          var target = event.target;
          var isAssetFailure = target && target !== window && (target.tagName === 'SCRIPT' || target.tagName === 'LINK');
          var message = event.message || (isAssetFailure ? 'asset load failed' : '');
          if (/module|script|chunk|CSP|Content Security Policy|asset load failed/i.test(message)) {
            showRecovery('module_error', message);
          }
        }, true);

        window.addEventListener('unhandledrejection', function (event) {
          var reason = event.reason;
          var message = reason && reason.message ? reason.message : String(reason || '');
          if (/module|chunk|dynamically imported|Failed to fetch/i.test(message)) {
            showRecovery('module_rejection', message);
          }
        });

        window.setTimeout(function () {
          var root = document.getElementById('root');
          var text = root ? (root.textContent || '').trim() : '';
          if (!root || !text || /جاري التحميل|loading/i.test(text)) {
            showRecovery('startup_timeout', text || 'empty root');
          }
        }, RECOVERY_DELAY_MS);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <!-- SW SKIP_WAITING handler -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.addEventListener('message', function (e) {
          if (e.data && e.data.type === 'SKIP_WAITING') {
            navigator.serviceWorker.getRegistration().then(function (reg) {
              if (reg && reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            });
          }
        });
      }
    </script>
  </body>
</html>
